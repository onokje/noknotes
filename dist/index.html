<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>NokNotes</title>
    <link rel="stylesheet" type="text/css" href="dist/editor.css">
</head>
<body>
<div id="sidebar">
    <h1>NokNotes</h1>
    <div id="newNoteContainer">
        <b>New Note:</b>
        <div>
            <input type="text" id="newNoteInput" placeholder="Enter a note title"/>
            <button id="newNoteSaveBtn" type="button">save</button>
        </div>

    </div>
    <ul id="notes"></ul>
</div>

<div id="main" class="collapse">
    <div id="topbar">
        <div id="showNoteListBtn">«</div>
        <div id="titleArea">
            <span id="noteName"></span>
            <button type="button" id="renameNoteBtn" title="Rename note" class="hidden">✎</button>
            <input type="text" id="renameNoteInput" maxlength="50" class="hidden" />
            <button type="button" id="renameNoteSaveBtn" class="hidden">save</button>
        </div>
        <div><button type="button" id="deleteNoteBtn">Delete note</button></div>
    </div>
    <div id="main_editor_container"><div class="nothingSelected">No note selected. Select a note or create a new one.</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="dist/app.js"></script>
</body>
</html>
